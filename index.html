<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日快乐 - QQ星</title>
    <style>
        :root {
            --pink: #ff7eb3;
            --pink-light: #ffb8d4;
            --gold: #ffd700;
            --gold-light: #ffe566;
            --purple: #c3aed6;
            --white: #fff8f0;
            --bg-start: #fff0f5;
            --bg-mid: #ffe4e1;
            --bg-end: #fff5ee;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #4a3040;
            --text-mid: #6b4d5d;
            --shadow-soft: 0 8px 32px rgba(180, 120, 140, 0.18);
            --shadow-card: 0 12px 40px rgba(160, 100, 130, 0.22);
            --shadow-gold: 0 4px 20px rgba(255, 180, 60, 0.35);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;
            --font-title: 'Georgia', 'STSong', 'Songti SC', 'Noto Serif SC', 'KaiTi', serif;
            --font-body: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'STHeiti', sans-serif;
            --font-cute: 'KaiTi', 'STKaiti', '楷体', 'PingFang SC', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(170deg, var(--bg-start) 0%, #ffe8f0 20%, var(--bg-mid) 45%, #fff0e8 65%, var(--bg-end) 100%);
            background-attachment: fixed;
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
            padding: 20px;
        }

        /* ============ 飘落粒子容器 ============ */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ============ 主容器 ============ */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeInUp 1s ease-out both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 顶部装饰气球 ============ */
        .balloons-row {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
            animation: floatBalloons 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatBalloons {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-16px);
            }
            60% {
                transform: translateY(-6px);
            }
            85% {
                transform: translateY(-14px);
            }
        }

        .balloon {
            width: 50px;
            height: 62px;
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            position: relative;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
            animation: wobble 2.5s ease-in-out infinite;
        }
        .balloon:nth-child(1) {
            background: radial-gradient(circle at 35% 30%, #ff9ec4, #e8578a);
            animation-delay: 0s;
        }
        .balloon:nth-child(2) {
            background: radial-gradient(circle at 35% 30%, #ffd97a, #f0a830);
            animation-delay: 0.5s;
        }
        .balloon:nth-child(3) {
            background: radial-gradient(circle at 35% 30%, #b8d4ff, #5b8def);
            animation-delay: 1s;
        }
        .balloon:nth-child(4) {
            background: radial-gradient(circle at 35% 30%, #c5e8b0, #6db844);
            animation-delay: 1.5s;
        }
        .balloon:nth-child(5) {
            background: radial-gradient(circle at 35% 30%, #e8c5f0, #b06cc4);
            animation-delay: 0.25s;
        }

        @keyframes wobble {
            0%,
            100% {
                transform: rotate(-2deg);
            }
            25% {
                transform: rotate(3deg);
            }
            50% {
                transform: rotate(-2.5deg);
            }
            75% {
                transform: rotate(2deg);
            }
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 22px;
            background: #c9a88c;
            border-radius: 0 0 2px 2px;
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            border-left: 2px solid #c9a88c;
            border-bottom: 2px solid #c9a88c;
            border-radius: 0 0 0 4px;
        }

        /* ============ 标题 ============ */
        .title-section {
            text-align: center;
            animation: fadeInUp 0.9s ease-out 0.15s both;
        }

        .title-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff7eb3, #ff5c8a);
            color: #fff;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            box-shadow: 0 4px 18px rgba(255, 100, 130, 0.35);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%,
            100% {
                box-shadow: 0 4px 18px rgba(255, 100, 130, 0.35);
            }
            50% {
                box-shadow: 0 6px 28px rgba(255, 100, 130, 0.55);
            }
        }

        .title-name {
            font-family: var(--font-title);
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: bold;
            background: linear-gradient(135deg, #e8578a, #c0396b, #d4688c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: none;
            line-height: 1.3;
        }

        .title-sub {
            font-family: var(--font-cute);
            font-size: 1.15rem;
            color: #8b6275;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ============ 图片卡片 ============ */
        .photo-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 16px;
            position: relative;
            animation: fadeInUp 0.9s ease-out 0.3s both;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 48px rgba(160, 100, 130, 0.3);
        }

        .photo-card-inner {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background: linear-gradient(135deg, #ffe8f0 0%, #fff0f5 30%, #ffe4e1 60%, #fff5ee 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed #f0c8d8;
            min-height: 200px;
        }

        .photo-card-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: var(--radius-md);
            transition: opacity 0.5s ease;
        }

        .photo-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #c9a0b0;
            font-family: var(--font-cute);
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .photo-placeholder .cake-emoji {
            font-size: 4rem;
            animation: bounce-cake 1.8s ease-in-out infinite;
            filter: drop-shadow(0 8px 16px rgba(200, 120, 140, 0.3));
        }

        @keyframes bounce-cake {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            15% {
                transform: translateY(-18px) scale(1.08);
            }
            30% {
                transform: translateY(0) scale(0.96);
            }
            45% {
                transform: translateY(-8px) scale(1.04);
            }
            60% {
                transform: translateY(0) scale(1);
            }
        }

        .photo-placeholder .placeholder-text {
            margin-top: 8px;
            font-size: 0.95rem;
            color: #b88998;
            letter-spacing: 1.5px;
        }

        /* 图片加载成功后隐藏placeholder */
        .photo-card-inner img.loaded~.photo-placeholder {
            opacity: 0;
        }

        /* 相框装饰角 */
        .photo-card::before,
        .photo-card::after {
            content: '✨';
            position: absolute;
            font-size: 1.6rem;
            pointer-events: none;
            animation: sparkle-float 2.5s ease-in-out infinite;
            z-index: 2;
        }
        .photo-card::before {
            top: -14px;
            left: 18px;
            animation-delay: 0s;
        }
        .photo-card::after {
            top: -14px;
            right: 18px;
            animation-delay: 1.2s;
            content: '🌟';
        }

        @keyframes sparkle-float {
            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-12px) scale(1.25);
                opacity: 1;
            }
        }

        /* 底部丝带装饰 */
        .ribbon-tag {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff7eb3, #ff5c8a);
            color: #fff;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: var(--shadow-gold);
            z-index: 2;
            white-space: nowrap;
        }

        /* ============ 祝福语卡片 ============ */
        .message-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            padding: 28px 26px;
            text-align: center;
            animation: fadeInUp 0.9s ease-out 0.45s both;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 210, 220, 0.5);
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(255, 180, 200, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .message-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, rgba(255, 210, 150, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .message-greeting {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: #c0396b;
            margin-bottom: 12px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .message-body {
            font-family: var(--font-cute);
            font-size: 1.08rem;
            color: var(--text-mid);
            line-height: 1.9;
            letter-spacing: 0.8px;
            position: relative;
            z-index: 1;
        }

        .message-body .highlight {
            color: #e8578a;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
            display: inline-block;
            animation: highlight-pop 1.5s ease-in-out infinite;
        }

        @keyframes highlight-pop {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
        }

        .message-signature {
            margin-top: 16px;
            font-family: var(--font-cute);
            font-size: 1rem;
            color: #b07a90;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 1;
        }

        /* ============ 蜡烛区 ============ */
        .candles-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: flex-end;
            animation: fadeInUp 0.9s ease-out 0.55s both;
        }

        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: candle-glow 2s ease-in-out infinite;
        }
        .candle:nth-child(2) {
            animation-delay: 0.3s;
        }
        .candle:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes candle-glow {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.2);
            }
        }

        .candle-flame {
            font-size: 1.8rem;
            animation: flicker 0.6s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 8px rgba(255, 160, 40, 0.7));
        }
        .candle:nth-child(2) .candle-flame {
            animation-delay: 0.2s;
            font-size: 2rem;
        }
        .candle:nth-child(3) .candle-flame {
            animation-delay: 0.4s;
        }

        @keyframes flicker {
            0% {
                transform: scaleY(1) scaleX(1);
                opacity: 0.9;
            }
            30% {
                transform: scaleY(1.15) scaleX(0.85);
                opacity: 1;
            }
            60% {
                transform: scaleY(0.9) scaleX(1.1);
                opacity: 0.85;
            }
            100% {
                transform: scaleY(1.05) scaleX(0.95);
                opacity: 1;
            }
        }

        .candle-body {
            width: 16px;
            height: 38px;
            border-radius: 6px 6px 3px 3px;
            margin-top: -2px;
            box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.1);
        }
        .candle:nth-child(1) .candle-body {
            background: linear-gradient(180deg, #ffe4e1, #f8c8d0);
        }
        .candle:nth-child(2) .candle-body {
            background: linear-gradient(180deg, #fff5e6, #f8d8b0);
            width: 20px;
            height: 46px;
        }
        .candle:nth-child(3) .candle-body {
            background: linear-gradient(180deg, #f0e6ff, #d8c0f0);
        }

        /* ============ 底部按钮 ============ */
        .btn-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.9s ease-out 0.65s both;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            position: relative;
            overflow: hidden;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff7eb3, #ff5c8a);
            color: #fff;
            box-shadow: 0 6px 22px rgba(255, 100, 140, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 100, 140, 0.55);
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 4px 14px rgba(255, 100, 140, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.7);
            color: #c0396b;
            border: 2px solid #f0c8d8;
            box-shadow: 0 4px 14px rgba(180, 120, 140, 0.15);
        }
        .btn-secondary:hover {
            background: #fff;
            border-color: #e8a0b8;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(180, 120, 140, 0.25);
        }
        .btn-secondary:active {
            transform: scale(0.95);
        }

        /* ============ 点击爱心特效 ============ */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 1.5rem;
            animation: heart-fly 1.4s ease-out forwards;
            user-select: none;
        }

        @keyframes heart-fly {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            30% {
                opacity: 1;
                transform: translateY(-60px) scale(1.3) rotate(15deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-180px) scale(0.2) rotate(-30deg);
            }
        }

        /* ============ 响应式 ============ */
        @media (max-width: 480px) {
            .balloon {
                width: 38px;
                height: 48px;
            }
            .balloon::before {
                height: 16px;
            }
            .balloon::after {
                bottom: -22px;
                width: 8px;
                height: 8px;
            }
            .balloons-row {
                gap: 10px;
            }
            .photo-card {
                padding: 10px;
                border-radius: var(--radius-md);
            }
            .photo-card-inner {
                aspect-ratio: 3 / 2;
                min-height: 160px;
                border-radius: var(--radius-sm);
            }
            .photo-card-inner img {
                border-radius: var(--radius-sm);
            }
            .photo-placeholder .cake-emoji {
                font-size: 3rem;
            }
            .message-card {
                padding: 20px 16px;
                border-radius: var(--radius-md);
            }
            .message-body {
                font-size: 0.95rem;
                line-height: 1.7;
            }
            .title-name {
                font-size: 1.8rem;
            }
            .btn {
                padding: 10px 22px;
                font-size: 0.9rem;
            }
            .ribbon-tag {
                font-size: 0.75rem;
                padding: 5px 14px;
            }
            .photo-card::before,
            .photo-card::after {
                font-size: 1.2rem;
                top: -10px;
            }
            .photo-card::before {
                left: 10px;
            }
            .photo-card::after {
                right: 10px;
            }
        }

        @media (max-width: 350px) {
            .balloons-row {
                gap: 6px;
            }
            .balloon {
                width: 30px;
                height: 38px;
            }
            .balloon::before {
                height: 12px;
            }
            .balloon::after {
                bottom: -18px;
                width: 6px;
                height: 6px;
            }
            .photo-card-inner {
                min-height: 130px;
            }
            .message-body {
                font-size: 0.85rem;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- 飘落粒子画布 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 主容器 -->
    <div class="main-container">

        <!-- 气球装饰 -->
        <div class="balloons-row">
            <div class="balloon"></div>
            <div class="balloon"></div>
            <div class="balloon"></div>
            <div class="balloon"></div>
            <div class="balloon"></div>
        </div>

        <!-- 标题 -->
        <div class="title-section">
            <div class="title-badge">🎉 生日快乐 🎉</div>
            <h1 class="title-name">QQ星</h1>
            <p class="title-sub">✨ 愿你的每一天都闪闪发光 ✨</p>
        </div>

        <!-- 图片展示区 - 引用名为 index 的图片 -->
        <!--
        ⚠️ 图片引用说明：
        请将你的图片文件命名为 index.jpg（或 index.png / index.gif）
        并放在与本 HTML 文件相同的目录下。
        支持的格式：index.jpg、index.png、index.gif、index.webp
        如果图片加载失败，下方会显示可爱的占位蛋糕图案。
        -->
        <div class="photo-card">
            <div class="photo-card-inner" id="photoContainer">
                <!--
                主要图片引用：尝试加载 index.jpg
                如果图片是其他格式，请修改下面的 src 属性，
                例如：src="./index.png" 或 src="./index.gif"
                -->
                <img
                id="mainPhoto"
                src="./index.jpg"
                alt="QQ星的生日照片"
                loading="eager"
                onerror="handleImageError(this)"
                onload="handleImageLoad(this)"
                style="position:relative;z-index:1;"
                />
                <!-- 备用占位符（图片未加载时显示） -->
                <div class="photo-placeholder" id="photoPlaceholder">
                    <span class="cake-emoji">🎂</span>
                    <span class="placeholder-text">📷 在这里放一张 index 图片吧~</span>
                </div>
            </div>
            <div class="ribbon-tag">📸 寿星时刻</div>
        </div>

        <!-- 祝福语卡片 -->
        <div class="message-card">
            <div class="message-greeting">💌 致亲爱的 <span class="highlight">QQ星</span></div>
            <p class="message-body">
                在这个特别的日子里，<br>
                愿所有的美好都向你奔赴而来 🌸<br>
                愿你的笑容如星光般璀璨，<br>
                愿你的每一天都充满温暖与惊喜 🎀<br>
                <strong>生日快乐！</strong>永远做个快乐的小星星 ⭐
            </p>
            <div class="message-signature">—— 你的好朋友 💕</div>
        </div>

        <!-- 蜡烛 -->
        <div class="candles-row">
            <div class="candle">
                <span class="candle-flame">🕯️</span>
                <div class="candle-body"></div>
            </div>
            <div class="candle">
                <span class="candle-flame">🔥</span>
                <div class="candle-body"></div>
            </div>
            <div class="candle">
                <span class="candle-flame">🕯️</span>
                <div class="candle-body"></div>
            </div>
        </div>

        <!-- 按钮 -->
        <div class="btn-row">
            <button class="btn btn-primary" onclick="sendWishes()" title="送上祝福">🎁 送上祝福</button>
            <button class="btn btn-secondary" onclick="createHeartBurst()" title="撒花庆祝">🌸 撒花庆祝</button>
        </div>
    </div>

    <script>
        // ==================== 图片加载处理 ====================
        function handleImageLoad(img) {
            img.classList.add('loaded');
            const placeholder = document.getElementById('photoPlaceholder');
            if (placeholder) {
                placeholder.style.opacity = '0';
                setTimeout(() => { placeholder.style.display = 'none'; }, 400);
            }
        }

        function handleImageError(img) {
            // 尝试其他常见格式
            const formats = ['./index.png', './index.gif', './index.webp', './index.jpeg'];
            let triedCount = 0;

            function tryNextFormat() {
                if (triedCount >= formats.length) {
                    // 所有格式都失败，保留占位符
                    console.log('📷 所有 index 图片格式均未找到，显示占位图案。请将图片命名为 index.jpg/png/gif 放在同目录下。');
                    img.style.opacity = '0';
                    img.style.position = 'absolute';
                    img.style.pointerEvents = 'none';
                    const placeholder = document.getElementById('photoPlaceholder');
                    if (placeholder) {
                        placeholder.style.opacity = '1';
                        placeholder.style.display = 'flex';
                    }
                    return;
                }

                const nextSrc = formats[triedCount];
                console.log('🔄 尝试加载:', nextSrc);
                const testImg = new Image();
                testImg.onload = function() {
                    img.src = nextSrc;
                    img.style.opacity = '1';
                    img.style.position = 'relative';
                    img.style.pointerEvents = 'auto';
                    handleImageLoad(img);
                };
                testImg.onerror = function() {
                    triedCount++;
                    tryNextFormat();
                };
                testImg.src = nextSrc;
            }

            tryNextFormat();
        }

        // ==================== 粒子飘落系统 ====================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 55;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            // 调整粒子位置
            particles.forEach(p => {
                if (p.x > canvas.width) p.x = canvas.width;
                if (p.y > canvas.height) p.y = -20;
            });
        });

        const emojiPool = ['🌸', '✨', '💖', '🌟', '🎀', '💕', '⭐', '🩷', '🧁', '🍰', '🎈', '💫', '🦋', '🌷', '💝', '🎵'];

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * canvas.width;
                this.y = initial ? Math.random() * canvas.height : -40 - Math.random() * 80;
                this.size = 14 + Math.random() * 22;
                this.speedY = 0.6 + Math.random() * 1.8;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 2;
                this.opacity = 0.55 + Math.random() * 0.45;
                this.wobbleAmp = Math.random() * 35;
                this.wobbleFreq = 0.003 + Math.random() * 0.006;
                this.emoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
                this.timeOffset = Math.random() * 1000;
            }

            update(time) {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(time * this.wobbleFreq + this.timeOffset) * 0.4;
                this.rotation += this.rotSpeed;

                if (this.y > canvas.height + 50) {
                    this.y = -40;
                    this.x = Math.random() * canvas.width;
                }
                if (this.x > canvas.width + 30) this.x = -30;
                if (this.x < -30) this.x = canvas.width + 30;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.font = `${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // 初始化粒子
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function animateParticles(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(timestamp);
                p.draw(ctx);
            });
            requestAnimationFrame(animateParticles);
        }
        requestAnimationFrame(animateParticles);

        // ==================== 撒花庆祝按钮 ====================
        function createHeartBurst() {
            const burstEmojis = ['🎉', '🎊', '🌸', '💖', '✨', '🎀', '💝', '🧁', '🎈', '💫', '🌟', '🍰', '💕', '🎵', '🦋'];
            const count = 35;

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.className = 'heart-particle';
                    heart.textContent = burstEmojis[Math.floor(Math.random() * burstEmojis.length)];
                    heart.style.left = (Math.random() * 85 + 5) + '%';
                    heart.style.top = (Math.random() * 40 + 40) + '%';
                    heart.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
                    heart.style.animationDuration = (1.2 + Math.random() * 2) + 's';
                    document.body.appendChild(heart);

                    // 自动清理
                    setTimeout(() => {
                        if (heart.parentNode) heart.parentNode.removeChild(heart);
                    }, 2200);
                }, i * 18);
            }
        }

        // ==================== 送上祝福按钮 ====================
        function sendWishes() {
            // 先来一波撒花
            createHeartBurst();

            // 延迟弹出祝福弹窗
            setTimeout(() => {
                const messages = [
                    '🎂 QQ星，生日快乐！愿你每天都开心！',
                    '🌟 愿QQ星的每一天都闪闪发光！',
                    '💖 祝QQ星新的一岁更加精彩！',
                    '🎀 生日快乐呀QQ星！永远可爱！',
                    '🍰 愿所有美好都降临在QQ星身上！',
                ];
                const msg = messages[Math.floor(Math.random() * messages.length)];

                // 创建自定义弹窗
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                            position:fixed;inset:0;background:rgba(0,0,0,0.5);
                            z-index:1000;display:flex;align-items:center;justify-content:center;
                            animation:fadeIn 0.3s ease-out;cursor:pointer;
                            -webkit-tap-highlight-color:transparent;
                        `;
                const dialog = document.createElement('div');
                dialog.style.cssText = `
                            background:#fff;border-radius:24px;padding:30px 24px;
                            max-width:380px;width:90%;text-align:center;
                            box-shadow:0 20px 50px rgba(0,0,0,0.25);
                            animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
                            cursor:default;
                        `;
                dialog.innerHTML = `
                            <div style="font-size:3.5rem;margin-bottom:12px;">🎂</div>
                            <p style="font-family:var(--font-cute);font-size:1.15rem;color:#4a3040;line-height:1.8;letter-spacing:1px;">${msg}</p>
                            <button style="
                                margin-top:16px;padding:10px 28px;border-radius:50px;border:none;
                                background:linear-gradient(135deg,#ff7eb3,#ff5c8a);color:#fff;
                                font-size:0.95rem;font-weight:600;letter-spacing:1px;cursor:pointer;
                                box-shadow:0 4px 16px rgba(255,100,140,0.4);
                                transition:all 0.3s ease;
                            " onclick="this.closest('[style*=\\'fixed\\']').remove()">💝 收下祝福</button>
                        `;
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);

                // 点击遮罩关闭
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.remove();
                });

                // 自动关闭
                setTimeout(() => {
                    if (overlay.parentNode) overlay.remove();
                }, 6000);
            }, 400);
        }

        // 添加弹窗动画的样式
        const popInStyle = document.createElement('style');
        popInStyle.textContent = `
                    @keyframes popIn {
                        0% { transform:scale(0.7);opacity:0; }
                        100% { transform:scale(1);opacity:1; }
                    }
                    @keyframes fadeIn {
                        0% { opacity:0; }
                        100% { opacity:1; }
                    }
                `;
        document.head.appendChild(popInStyle);

        // ==================== 键盘/触摸全局撒花 ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                createHeartBurst();
            }
        });

        // 双击页面任意位置撒花
        document.addEventListener('dblclick', function(e) {
            createHeartBurst();
        });

        // ==================== 初始加载小惊喜 ====================
        setTimeout(() => {
            // 页面加载后1.5秒自动来一波小撒花
            const miniBurst = ['🌸', '✨', '💖', '🎀'];
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.className = 'heart-particle';
                    heart.textContent = miniBurst[Math.floor(Math.random() * miniBurst.length)];
                    heart.style.left = (Math.random() * 80 + 10) + '%';
                    heart.style.top = (Math.random() * 30 + 30) + '%';
                    heart.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
                    heart.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => {
                        if (heart.parentNode) heart.parentNode.removeChild(heart);
                    }, 2500);
                }, i * 60);
            }
        }, 1500);

        console.log('🎂✨ QQ星的生日祝福页面已就绪！');
        console.log('📷 图片引用路径: ./index.jpg (也支持 index.png / index.gif / index.webp)');
        console.log('💡 提示：按空格键或双击页面可以撒花庆祝哦~');
    </script>
</body>
</html>
